    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Helvetica", serif;
        overflow-x: hidden;
        background-color: white;
      }

      /* Main Content */
      #main-content {
        position: relative;
        min-height: 100vh;
        z-index: 10;
        color: black;
      }

      nav {
        display: flex;
        position: sticky;
        top: 0;
        justify-content: space-between;
        align-items: center;
        padding: 25px 20px;
        background: rgb(255, 255, 255);
        z-index: 1000;
      }

      nav a {
        color: black;
        text-decoration: none;
        margin: 0 15px;
        font-size: 18px;
        transition: color 0.3s ease;
      }

      .nav-content {
        display: flex;
        gap: 20px;
      }

      .highlight {
        font-weight: bold;
      }

      /* Nav animation */
      .hover-underline-animation {
        display: inline-block;
        position: relative;
      }

      .hover-underline-animation::after {
        content: "";
        position: absolute;
        width: 100%;
        transform: scaleX(0);
        height: 2px;
        bottom: 0;
        left: 0;
        background-color: #000000;
        transition: transform 0.25s ease-out;
      }

      .hover-underline-animation:hover::after {
        transform: scaleX(1);
      }

      .hover-underline-animation.left::after {
        transform-origin: bottom right;
      }

      .hover-underline-animation.left:hover::after {
        transform-origin: bottom left;
      }

      .work-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 50px 80px;
        gap: 30px;
      }

      .work-title {
        font-size: 40px;
        width: 100%;
        text-align: left;
        font-weight: 400;
      }

      .work-description {
        font-size: 20px;
        font-weight: 300;
        width: 100%;
        text-align: left;
        margin-bottom: 100px;
      }

      .images {
        width: 90vw;
      }

      /* Footer */
      footer {
        margin-top: 100px;
        display: flex;
        width: 100%;
        flex-direction: column;
      }

      .slogan {
        display: flex;
        justify-content: center;
        align-items: center;
        text-transform: none;
        font-size: 40px;
      }

      .socials {
        display: flex;
        justify-content: start;
        gap: 15px;
        padding: 20px;
      }

      .socials img {
        width: 36px;
        height: 36px;
      }

      /* Parallax & reveal styles */
      [data-parallax] {
        will-change: transform;
        transform: translateZ(0);
      }

      .scroll-reveal {
        opacity: 0;
        transform: translateY(30px) scale(0.995);
        transition:
          opacity 700ms cubic-bezier(0.2, 0.9, 0.2, 1),
          transform 700ms cubic-bezier(0.2, 0.9, 0.2, 1);
        will-change: opacity, transform;
      }

      .scroll-reveal.in-view {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      @media only screen and (max-width: 768px) {
        nav {
          display: flex;
          position: relative;
          top: 0;
          justify-content: center;
          flex-direction: column;
          gap: 30px;
          text-align: center;
        }

        .nav-content {

          position: relative;
          top: 0;
          justify-content: center;
          flex-direction: column;
          gap: 30px;
        }

        }

        footer img {
                max-width: 100vw;
            }

        img {
          width: 100% !important;
          height: auto !important;
        }
      }

    <script>
      // Parallax + scroll-reveal controller
      (function () {
        const easing = (v) => v; // placeholder
        let lastScroll = window.scrollY || 0;
        let rAF = null;

        const parallaxEls = Array.from(
          document.querySelectorAll("[data-parallax]"),
        );
        const revealEls = Array.from(
          document.querySelectorAll(".scroll-reveal"),
        );

        function update() {
          const scrollY = window.scrollY || window.pageYOffset;
          const velocity = scrollY - lastScroll;

          // parallax transforms
          parallaxEls.forEach((el) => {
            const speed = parseFloat(el.getAttribute("data-speed")) || 0;
            // translateY based on scroll and element's speed
            const y = Math.round(scrollY * speed);
            // small parallax plus slight skew based on velocity
            const skew = Math.max(-6, Math.min(6, velocity * 0.02));
            el.style.transform = `translate3d(0, ${y}px, 0) skewY(${skew}deg)`;
          });

          lastScroll = scrollY;
          rAF = null;
        }

        function schedule() {
          if (rAF) return;
          rAF = requestAnimationFrame(update);
        }

        // reveal via intersection observer
        const io = new IntersectionObserver(
          (entries) => {
            entries.forEach((e) => {
              if (e.isIntersecting) e.target.classList.add("in-view");
            });
          },
          { threshold: 0.12 },
        );
        revealEls.forEach((el) => io.observe(el));

        // initial schedule and events
        window.addEventListener("scroll", schedule, { passive: true });
        window.addEventListener("resize", schedule);
        // run once to set positions
        schedule();
      })();
    </script>
  </body>
</html>
